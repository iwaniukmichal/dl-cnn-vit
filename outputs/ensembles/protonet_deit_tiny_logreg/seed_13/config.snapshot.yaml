mode: ensemble
phase: ensembles
experiment_name: protonet_deit_tiny_logreg
paths:
  data_root: data/cinic10
  output_root: outputs
  subset_root: data/manifests
dataset:
  name: cinic10
  train_split: train
  val_split: valid
  test_split: test
  input_size: 224
  num_classes: 10
  normalization: imagenet
subset:
  enabled: true
  fraction: 0.1
  class_balanced: true
  manifest_name: null
seed: 13
model:
  family: vit
  name: deit_tiny
  pretrained: true
  num_classes: 10
  drop_path: 0.0
optimizer:
  name: adamw
  lr: 0.0003
  weight_decay: 0.0001
scheduler:
  name: none
  t_max: null
training:
  epochs: 30
  batch_size: 64
  num_workers: 4
  device: auto
  deterministic: false
  mixed_precision: true
  log_every: 20
augmentation:
  name: baseline
  cutmix_alpha: 1.0
fewshot:
  n_way: 10
  k_shot: 5
  q_query: 15
  train_episodes: 200
  val_episodes: 100
  test_episodes: 200
outputs:
  save_checkpoints: true
  save_predictions: true
  save_embeddings: true
analysis:
  checkpoint_dir: ''
  checkpoint_type: fewshot
  split: test
  include_train_split: false
  manifest_name: null
  samples_per_class: null
  max_tsne_samples: 2000
  enable_tsne: true
  tsne_random_state: 42
ensemble:
  cnn_checkpoint_dir: ''
  vit_checkpoint_dir: ''
  protonet_checkpoint_dir: outputs/phase4/protonet_deit_tiny_advanced
  cnn_manifest_name: null
  vit_manifest_name: null
  protonet_manifest_name: phase4_subset01_deit_tiny.txt
  cnn_input_size: 300
  vit_input_size: 224
  meta_split: train
  eval_split: test
  logistic_regression_c: 1.0
search:
  space: {}
  selection_metric: val_accuracy
