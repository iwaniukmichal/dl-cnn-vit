mode: supervised
phase: phase3
experiment_name: efficientnet_b3_combined
paths:
  output_root: outputs
  subset_root: data/manifests
dataset:
  input_size: 300
subset:
  enabled: true
  fraction: 0.05
  class_balanced: true
  manifest_name: phase3_subset05.txt
model:
  family: pretrained_cnn
  name: efficientnet_b3
  pretrained: true
  num_classes: 10
  drop_path: 0.1
optimizer:
  name: adamw
  lr: 0.0003
  weight_decay: 0.0005
scheduler:
  name: cosine
training:
  epochs: 5
  batch_size: 64
  num_workers: 4
  device: auto
augmentation:
  name: combined
  cutmix_alpha: 1.0
