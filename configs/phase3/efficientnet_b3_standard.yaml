  output_root: outputs
  subset_root: data/manifests
dataset:
  input_size: 300
model:
  family: pretrained_cnn
  name: efficientnet_b3
  pretrained: true
  num_classes: 10
  drop_path: 0.1
optimizer:
  name: adamw
  lr: 0.001
  weight_decay: 0.0005
scheduler:
  name: cosine
training:
  epochs: 20
  batch_size: 64
  num_workers: 4
  device: auto
augmentation:
  name: standard
