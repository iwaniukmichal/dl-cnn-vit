mode: supervised
phase: phase3
experiment_name: deit_tiny_baseline
paths:
  data_root: data/cinic10
  output_root: outputs
  subset_root: data/manifests
dataset:
  input_size: 224
subset:
  enabled: true
  fraction: 0.1
  class_balanced: true
  manifest_name: phase3_train10.txt
model:
  family: vit
  name: deit_tiny
  pretrained: true
  num_classes: 10
  drop_path: 0.1
optimizer:
  name: adamw
  lr: 0.0002
  weight_decay: 0.1
scheduler:
  name: cosine
training:
  epochs: 10
  batch_size: 64
  num_workers: 4
  device: auto
augmentation:
  name: baseline
