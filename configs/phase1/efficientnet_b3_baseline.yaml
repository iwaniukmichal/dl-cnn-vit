mode: supervised
phase: phase1
experiment_name: efficientnet_b3_baseline
paths:
  data_root: data/cinic10
  output_root: outputs
  subset_root: data/manifests
dataset:
  input_size: 300
  num_classes: 10
model:
  family: pretrained_cnn
  name: efficientnet_b3
  pretrained: true
  num_classes: 10
  drop_path: 0.0
optimizer:
  name: adamw
  lr: 0.0003
  weight_decay: 0.0001
scheduler:
  name: none
training:
  epochs: 5
  batch_size: 64
  num_workers: 4
  device: auto
augmentation:
  name: baseline
outputs:
  save_checkpoints: true
  save_predictions: true
  save_embeddings: true
