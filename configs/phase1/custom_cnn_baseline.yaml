mode: supervised
phase: phase1
experiment_name: custom_cnn_baseline
paths:
  output_root: outputs
  subset_root: data/manifests
dataset:
  name: cinic10
  train_split: train
  val_split: valid
  test_split: test
  input_size: 32
  num_classes: 10
subset:
  enabled: true
  fraction: 0.05
  class_balanced: true
  manifest_name: phase1_subset05.txt
model:
  family: custom_cnn
  name: custom_cnn
  pretrained: false
  num_classes: 10
  drop_path: 0.0
optimizer:
  name: adamw
  lr: 0.001
  weight_decay: 0.0005
scheduler:
  name: none
training:
  epochs: 15
  batch_size: 128
  num_workers: 4
  device: auto
augmentation:
  name: baseline
outputs:
  save_checkpoints: true
  save_predictions: true
  save_embeddings: true
