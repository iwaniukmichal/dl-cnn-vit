mode: fewshot
phase: phase4
experiment_name: protonet_efficientnet_b3_advanced
paths:
  output_root: outputs
  subset_root: data/manifests
dataset:
  input_size: 300
subset:
  enabled: true
  fraction: 0.1
  class_balanced: true
  manifest_name: phase4_subset01_efficientnet_b3.txt
model:
  family: pretrained_cnn
  name: efficientnet_b3
  pretrained: true
  num_classes: 10
  drop_path: 0.1
optimizer:
  name: adamw
  lr: 0.0003
  weight_decay: 0.0005
scheduler:
  name: cosine
training:
  epochs: 5
  num_workers: 4
augmentation:
  name: advanced
  cutmix_alpha: 1.0
fewshot:
  n_way: 5
  k_shot: 5
  q_query: 10
  train_episodes: 200
  val_episodes: 100
  test_episodes: 200
