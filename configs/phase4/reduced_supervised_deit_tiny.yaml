mode: supervised
phase: phase4
experiment_name: reduced_supervised_deit_tiny
paths:
  data_root: data/cinic10
  output_root: outputs
  subset_root: data/manifests
dataset:
  input_size: 224
subset:
  enabled: true
  fraction: 0.1
  class_balanced: true
  manifest_name: phase4_train10_deit_tiny.txt
model:
  family: vit
  name: deit_tiny
  pretrained: true
  num_classes: 10
  drop_path: 0.1
optimizer:
  name: adamw
  lr: 0.0002
  weight_decay: 0.1
scheduler:
  name: cosine
training:
  epochs: 20
  batch_size: 32
  num_workers: 4
augmentation:
  name: combined
  cutmix_alpha: 1.0
