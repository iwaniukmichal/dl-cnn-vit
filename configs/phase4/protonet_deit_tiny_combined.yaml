mode: fewshot
phase: phase4
experiment_name: protonet_deit_tiny_combined
paths:
  data_root: data/cinic10
  output_root: outputs
  subset_root: data/manifests
dataset:
  input_size: 224
subset:
  enabled: true
  fraction: 0.05
  class_balanced: true
  manifest_name: phase4_train05_deit_tiny.txt
model:
  family: vit
  name: deit_tiny
  pretrained: true
  num_classes: 10
  drop_path: 0.1
optimizer:
  name: adamw
  lr: 0.00005
  weight_decay: 0.05
scheduler:
  name: cosine
training:
  epochs: 20
  num_workers: 4
augmentation:
  name: combined
  cutmix_alpha: 1.0
fewshot:
  n_way: 5
  k_shot: 5
  q_query: 15
  train_episodes: 200
  val_episodes: 100
  test_episodes: 200
