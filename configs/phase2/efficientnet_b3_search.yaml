mode: search
phase: phase2
experiment_name: efficientnet_b3_search
paths:
  data_root: data/cinic10
  output_root: outputs
  subset_root: data/manifests
dataset:
  input_size: 300
  num_classes: 10
subset:
  enabled: true
  fraction: 0.1
  class_balanced: true
  manifest_name: phase2_train10_efficientnet_b3.txt
model:
  family: pretrained_cnn
  name: efficientnet_b3
  pretrained: true
  num_classes: 10
  drop_path: 0.0
optimizer:
  name: adamw
  lr: 0.0003
  weight_decay: 0.0001
scheduler:
  name: none
training:
  epochs: 15
  batch_size: 32
  num_workers: 4
  device: auto
augmentation:
  name: baseline
search:
  selection_metric: val_accuracy
  space:
    lr: [0.0003, 0.001]
    scheduler: [none, cosine]
    drop_path: [0.0, 0.1]
    weight_decay: [0.0001, 0.0005]
