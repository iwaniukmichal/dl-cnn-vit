mode: embedding_analysis
phase: analysis
experiment_name: embeddings_efficientnet_b3_supervised
paths:
  output_root: outputs
  subset_root: data/manifests
dataset:
  input_size: 300
model:
  family: pretrained_cnn
  name: efficientnet_b3
  pretrained: true
  num_classes: 10
  drop_path: 0.1
training:
  batch_size: 64
  num_workers: 4
analysis:
  checkpoint_dir: outputs/phase4/not_reduced_supervised_efficientnet_b3
  checkpoint_type: supervised
  split: test
  include_train_split: true
  manifest_name: phase4_subset01_efficientnet_b3.txt
  samples_per_class: 100
  max_tsne_samples: 1000
  enable_tsne: true
  tsne_random_state: 42
